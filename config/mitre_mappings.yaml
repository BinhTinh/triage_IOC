techniques:
  T1055:
    name: "Process Injection"
    tactic: "Defense Evasion"
    description: "Adversaries may inject code into processes to evade process-based defenses and elevate privileges"
    data_sources:
      - "Process: OS API Execution"
      - "Process: Process Modification"
    indicators:
      - malfind_rwx
      - hollow_process
      - dll_injection
      - remote_thread
    recommendations:
      - "Analyze injected memory regions"
      - "Dump suspicious process memory for further analysis"
      - "Check for known injection signatures"
      - "Review process hollowing indicators"

  T1055.001:
    name: "Dynamic-link Library Injection"
    tactic: "Defense Evasion"
    description: "Adversaries may inject DLLs into processes to execute arbitrary code"
    data_sources:
      - "Module: Module Load"
      - "Process: OS API Execution"
    indicators:
      - suspicious_dll_load
      - ldrmodules_unlinked
      - unknown_dll_path
    recommendations:
      - "Review loaded DLLs for anomalies"
      - "Check DLL paths against known-good locations"
      - "Verify DLL digital signatures"

  T1055.012:
    name: "Process Hollowing"
    tactic: "Defense Evasion"
    description: "Adversaries may inject malicious code into suspended and hollowed processes"
    data_sources:
      - "Process: Process Modification"
    indicators:
      - hollow_process
      - unmapped_code
      - suspended_thread
    recommendations:
      - "Check for hollowed processes using memory forensics"
      - "Compare process image to disk image"
      - "Review process creation patterns"

  T1059:
