services:
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: volatility3-mcp-server
    ports:
      - "8000:8000"
    volumes:
      - ./data/dumps:/app/data/dumps:ro
      - ./data/reports:/app/data/reports
      - ./data/symbols:/app/data/symbols
      - ./config:/app/config:ro
      - ./volatility3:/app/volatility3:ro
    environment:
      - REDIS_URL=redis://redis:6379
      - VT_API_KEY=${VT_API_KEY}
      - ABUSEIPDB_KEY=${ABUSEIPDB_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - ALLOWED_DUMP_DIRS=/app/data/dumps
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - USE_DEEPSEEK=${USE_DEEPSEEK:-true}
      - USE_LOCAL_PATTERNS=${USE_LOCAL_PATTERNS:-true}
      - SYMBOLS_DIR=/app/data/symbols/volatility3
      - REPORTS_DIR=/app/data/reports
      - CONFIG_DIR=/app/config
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G

  redis:
    image: redis:7-alpine
    container_name: volatility3-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  redis_data:

networks:
  default:
    name: volatility3-network
